  /* safe area top padding — ステータスバー(約50px) + 余白16px を確保 */

<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js"></script>

<script>
'use strict';
const {useState,useCallback,useEffect,useRef} = React;
const h = React.createElement;

// ── constants ─────────────────────────────────────────
const WEEKDAYS = ['日','月','火','水','木','金','土'];
const FOLDER_COLORS = ['#c8b89a','#7eb8a4','#a07eb8','#e08080','#7896d0','#c8a060','#80b880'];
const BG_PRESETS = [
  {label:'ダーク',   bg:'#0a0a0f'},
  {label:'チャコール',bg:'#1c1c22'},
  {label:'ネイビー', bg:'#0d1117'},
  {label:'フォレスト',bg:'#0f1a12'},
  {label:'ライト',   bg:'#f5f2ee'},
  {label:'クリーム', bg:'#faf6ef'},
  {label:'スカイ',   bg:'#e8f0f8'},
  {label:'ペーパー', bg:'#f0ede6'},
];
const STORAGE_KEY = 'photo-location-v1';

// ── weather ───────────────────────────────────────────
const WEATHERS = [
  {id:'sunny',    icon:'☀️',  label:'晴れ'},
  {id:'cloudy',   icon:'⛅',  label:'曇り'},
  {id:'overcast', icon:'☁️',  label:'曇天'},
  {id:'rainy',    icon:'🌧️', label:'雨'},
  {id:'stormy',   icon:'⛈️', label:'雷雨'},
  {id:'snowy',    icon:'❄️',  label:'雪'},
  {id:'foggy',    icon:'🌫️', label:'霧'},
  {id:'windy',    icon:'💨',  label:'風'},
  {id:'hot',      icon:'🌡️', label:'猛暑'},
  {id:'night',    icon:'🌙',  label:'夜'},
];

// ── utils ─────────────────────────────────────────────
function fmt(d){ return d.toLocaleTimeString('ja-JP',{hour:'2-digit',minute:'2-digit'}); }
function toYMD(d){ return `${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}-${String(d.getDate()).padStart(2,'0')}`; }

function luminance(hex){
  const h2=hex.replace('#','');
  const r=parseInt(h2.slice(0,2),16)/255,g=parseInt(h2.slice(2,4),16)/255,b=parseInt(h2.slice(4,6),16)/255;
  const lin=c=>c<=0.04045?c/12.92:Math.pow((c+0.055)/1.055,2.4);
  return 0.2126*lin(r)+0.7152*lin(g)+0.0722*lin(b);
}
function isDark(hex){ return luminance(hex)<0.4; }

function makeTheme(bg){
  const d=isDark(bg);
  return {
    bg,
    text:        d?'#e8e4dc':'#1a1814',
    textSub:     d?'#888':'#666',
    textMuted:   d?'#555':'#999',
    textFaint:   d?'#333':'#bbb',
    accent:      d?'#c8b89a':'#7a6a52',
    accentBg:    d?'rgba(200,184,154,0.12)':'rgba(100,80,50,0.1)',
    accentBorder:d?'rgba(200,184,154,0.25)':'rgba(100,80,50,0.25)',
    cardBg:      d?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.04)',
    cardBorder:  d?'rgba(255,255,255,0.07)':'rgba(0,0,0,0.08)',
    divider:     d?'rgba(255,255,255,0.06)':'rgba(0,0,0,0.08)',
    inputBg:     d?'rgba(255,255,255,0.04)':'rgba(0,0,0,0.04)',
    inputBorder: d?'rgba(200,184,154,0.2)':'rgba(100,80,50,0.2)',
    modalBg:     d?'#141418':'#ffffff',
    sun:         d?'#c06060':'#c04040',
    sat:         d?'#6080c0':'#4060b0',
    tabActive:   d?'#c8b89a':'#7a6a52',
    tabActiveTxt:d?'#0a0a0f':'#ffffff',
  };
}

// ── storage ───────────────────────────────────────────
function loadState(){
  try{
    const s=localStorage.getItem(STORAGE_KEY);
    if(s) return JSON.parse(s);
  }catch{}
  return null;
}
function saveState(state){
  try{ localStorage.setItem(STORAGE_KEY,JSON.stringify(state)); }catch{}
}

// ── Modal ─────────────────────────────────────────────
function Modal({title,onClose,children,th}){
  return h('div',{className:'overlay',onClick:onClose},
    h('div',{className:'modal-box',style:{background:th.modalBg,border:`1px solid ${th.accentBorder}`},onClick:e=>e.stopPropagation()},
      h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:18}},
        h('div',{style:{fontSize:15,fontWeight:500,color:th.text}},title),
        h('button',{onClick:onClose,style:{background:'none',border:'none',color:th.textSub,fontSize:22,lineHeight:1,padding:4}},'×')
      ),
      children
    )
  );
}

// ── Confirm ───────────────────────────────────────────
function Confirm({message,onOk,onCancel,th}){
  return h('div',{className:'overlay',style:{zIndex:300}},
    h('div',{style:{background:th.modalBg,border:'1px solid rgba(255,80,80,0.35)',borderRadius:14,padding:24,width:'100%',maxWidth:300,textAlign:'center'}},
      h('div',{style:{fontSize:14,color:th.text,marginBottom:20,lineHeight:1.7,whiteSpace:'pre-line'}},message),
      h('div',{style:{display:'flex',gap:10,justifyContent:'center'}},
        h('button',{onClick:onCancel,style:{background:'none',border:`1px solid ${th.cardBorder}`,borderRadius:8,color:th.textSub,padding:'8px 18px',fontSize:13}},'キャンセル'),
        h('button',{onClick:onOk,style:{background:'rgba(255,80,80,0.15)',border:'1px solid rgba(255,80,80,0.5)',borderRadius:8,color:'#ff8080',padding:'8px 18px',fontSize:13}},'削除する')
      )
    )
  );
}

// ── Compass ───────────────────────────────────────────
function Compass({th, locating, gpsPos}){
  const [heading, setHeading] = useState(null);   // degrees, null = unknown
  const [permErr, setPermErr] = useState(false);
  const headingRef = useRef(null);
  const rafRef     = useRef(null);
  const targetRef  = useRef(0);
  const currentRef = useRef(0);

  // smooth rotation via RAF
  function tick(){
    const diff = targetRef.current - currentRef.current;
    // shortest path
    let d = ((diff % 360) + 540) % 360 - 180;
    currentRef.current += d * 0.12;
    if(headingRef.current){
      headingRef.current.style.transform = `rotate(${-currentRef.current}deg)`;
    }
    rafRef.current = requestAnimationFrame(tick);
  }

  useEffect(()=>{
    rafRef.current = requestAnimationFrame(tick);
    return ()=>cancelAnimationFrame(rafRef.current);
  },[]);

  useEffect(()=>{
    let cleanup = ()=>{};
    function onOrientation(e){
      // webkitCompassHeading = iOS true north; alpha = generic (south-referenced on some)
      let deg = e.webkitCompassHeading ?? (e.alpha != null ? (360 - e.alpha) : null);
      if(deg == null) return;
      targetRef.current = deg;
      setHeading(Math.round(deg));
    }

    if(typeof DeviceOrientationEvent !== 'undefined'){
      // iOS 13+ requires permission
      if(typeof DeviceOrientationEvent.requestPermission === 'function'){
        DeviceOrientationEvent.requestPermission()
          .then(state=>{
            if(state==='granted'){
              window.addEventListener('deviceorientationabsolute', onOrientation, true);
              window.addEventListener('deviceorientation', onOrientation, true);
              cleanup = ()=>{
                window.removeEventListener('deviceorientationabsolute', onOrientation, true);
                window.removeEventListener('deviceorientation', onOrientation, true);
              };
            } else { setPermErr(true); }
          }).catch(()=>setPermErr(true));
      } else {
        window.addEventListener('deviceorientationabsolute', onOrientation, true);
        window.addEventListener('deviceorientation', onOrientation, true);
        cleanup = ()=>{
          window.removeEventListener('deviceorientationabsolute', onOrientation, true);
          window.removeEventListener('deviceorientation', onOrientation, true);
        };
      }
    }
    return ()=>cleanup();
  },[]);

  const accent = th.accent;
  const dim    = isDark(th.bg) ? 'rgba(255,255,255,0.06)' : 'rgba(0,0,0,0.06)';
  const dimMid = isDark(th.bg) ? 'rgba(255,255,255,0.12)' : 'rgba(0,0,0,0.1)';

  // cardinal direction label
  function cardinalDir(deg){
    if(deg==null) return '---';
    const dirs=['N','NE','E','SE','S','SW','W','NW'];
    return dirs[Math.round(deg/45)%8];
  }

  return h('div',{style:{
    position:'relative', width:'100%', borderRadius:16,
    background: isDark(th.bg)?'rgba(255,255,255,0.02)':'rgba(0,0,0,0.03)',
    border:`1px solid ${th.accentBorder}`,
    display:'flex', flexDirection:'column', alignItems:'center',
    padding:'20px 16px 16px', gap:12, overflow:'hidden',
  }},
    // corner brackets
    ...['tl','tr','bl','br'].map(p=>h('div',{key:p,style:{
      position:'absolute', width:14, height:14, zIndex:2, pointerEvents:'none',
      borderTop:   p[0]==='t'?`2px solid ${accent}`:'none',
      borderBottom:p[0]==='b'?`2px solid ${accent}`:'none',
      borderLeft:  p[1]==='l'?`2px solid ${accent}`:'none',
      borderRight: p[1]==='r'?`2px solid ${accent}`:'none',
      top:p[0]==='t'?8:'auto', bottom:p[0]==='b'?8:'auto',
      left:p[1]==='l'?8:'auto', right:p[1]==='r'?8:'auto',
    }})),

    // compass rose
    h('div',{style:{position:'relative', width:190, height:190, flexShrink:0}},

      // outer ring
      h('div',{style:{
        position:'absolute', inset:0, borderRadius:'50%',
        border:`1px solid ${dimMid}`,
        background:`radial-gradient(circle, ${isDark(th.bg)?'#111':'#f0ede6'} 0%, ${isDark(th.bg)?'#0a0a0f':'#e8e4dc'} 100%)`,
      }}),

      // tick marks (every 30°)
      ...[...Array(12)].map((_,i)=>{
        const a = i*30, major = i%3===0;
        const r = 90;
        const rad = (a-90)*Math.PI/180;
        const x1 = 95 + (r - (major?12:7)) * Math.cos(rad);
        const y1 = 95 + (r - (major?12:7)) * Math.sin(rad);
        const x2 = 95 + r * Math.cos(rad);
        const y2 = 95 + r * Math.sin(rad);
        return h('svg',{key:i,style:{position:'absolute',inset:0,width:'100%',height:'100%',overflow:'visible'},viewBox:'0 0 190 190'},
          h('line',{x1,y1,x2,y2,stroke:major?dimMid:dim,strokeWidth:major?1.5:1})
        );
      }),

      // rotating needle group
      h('div',{ref:headingRef,style:{
        position:'absolute', inset:0,
        transformOrigin:'50% 50%',
        // initial will be set by RAF
      }},
        // N label
        h('div',{style:{
          position:'absolute', top:4, left:'50%', transform:'translateX(-50%)',
          fontSize:13, fontWeight:700, color:'#e05050', fontFamily:'DM Mono', letterSpacing:1,
        }},'N'),
        // S label
        h('div',{style:{
          position:'absolute', bottom:4, left:'50%', transform:'translateX(-50%)',
          fontSize:11, fontWeight:400, color:th.textMuted, fontFamily:'DM Mono',
        }},'S'),
        // E label
        h('div',{style:{
          position:'absolute', right:6, top:'50%', transform:'translateY(-50%)',
          fontSize:11, color:th.textMuted, fontFamily:'DM Mono',
        }},'E'),
        // W label
        h('div',{style:{
          position:'absolute', left:6, top:'50%', transform:'translateY(-50%)',
          fontSize:11, color:th.textMuted, fontFamily:'DM Mono',
        }},'W'),

        // needle (SVG triangle)
        h('svg',{style:{position:'absolute',inset:0,width:'100%',height:'100%'},viewBox:'0 0 190 190',overflow:'visible'},
          // north (red)
          h('polygon',{points:'95,28 100,95 90,95',fill:'#e05050',opacity:0.95}),
          // south (accent)
          h('polygon',{points:'95,162 100,95 90,95',fill:accent,opacity:0.7}),
          // center dot
          h('circle',{cx:95,cy:95,r:6,fill:th.modalBg,stroke:accent,strokeWidth:1.5}),
          h('circle',{cx:95,cy:95,r:2.5,fill:accent}),
        )
      ),

      // fixed crosshair ring
      h('div',{style:{
        position:'absolute', inset:'30%',
        borderRadius:'50%', border:`1px dashed ${dimMid}`,
        pointerEvents:'none',
      }}),
    ),

    // degree display
    h('div',{style:{display:'flex',alignItems:'baseline',gap:8}},
      h('span',{style:{fontFamily:'DM Mono',fontSize:28,fontWeight:400,color:accent,letterSpacing:1}},
        heading!=null ? String(heading).padStart(3,'0')+'°' : '---'
      ),
      h('span',{style:{fontFamily:'DM Mono',fontSize:14,color:th.textSub,minWidth:28}},
        cardinalDir(heading)
      )
    ),

    // gps coords row
    h('div',{style:{display:'flex',justifyContent:'space-between',width:'100%',
      padding:'6px 10px', borderRadius:8, background:isDark(th.bg)?'rgba(255,255,255,0.03)':'rgba(0,0,0,0.04)',
      border:`1px solid ${th.cardBorder}`}},
      gpsPos
        ? h(React.Fragment, null,
            h('span',{style:{fontFamily:'DM Mono',fontSize:10,color:th.textSub}},
              gpsPos.lat.toFixed(5)+',  '+gpsPos.lng.toFixed(5)),
            h('span',{style:{fontFamily:'DM Mono',fontSize:10,color:th.textMuted}},'±'+gpsPos.acc+'m')
          )
        : h('span',{style:{fontFamily:'DM Mono',fontSize:10,color:th.textFaint,margin:'0 auto'}},
            locating ? '位置情報取得中...' : '記録ボタンで位置を取得')
    ),

    // permission error
    permErr && h('div',{style:{fontSize:11,color:'#ff9090',textAlign:'center'}},
      'コンパスの許可が必要です（設定 › Safari › モーションと画面の向き）'
    )
  );
}

// ── App ───────────────────────────────────────────────
function App(){
  // load persisted state
  const persisted = loadState();
  const [folders,setFolders] = useState(persisted?.folders || [{id:'f1',name:'未分類',color:'#888'}]);
  const [records,setRecords] = useState(persisted?.records || []);
  const [bgColor,setBgColor] = useState(persisted?.bgColor || '#0a0a0f');

  // persist on change — lastActive も一緒に保存
  useEffect(()=>{ saveState({folders,records,bgColor}); },[folders,records,bgColor]);

  // 5分以上経過していたら記録画面にリセット
  const RESET_MS = 5 * 60 * 1000;
  useEffect(()=>{
    const LS_KEY = 'photo-loc-active';

    function checkAndReset(){
      const last = parseInt(localStorage.getItem(LS_KEY)||'0', 10);
      if(last && Date.now() - last >= RESET_MS){
        setView('record');
        setSelFolder(null);
        setSelDate(null);
      }
      localStorage.setItem(LS_KEY, Date.now());
    }

    // 初回チェック
    checkAndReset();

    // バックグラウンドから復帰したとき（iOSで最も確実）
    window.addEventListener('pageshow', checkAndReset);
    // visibilitychange も念のため併用
    function onVisible(){ if(!document.hidden) checkAndReset(); }
    document.addEventListener('visibilitychange', onVisible);
    // アクティブ中は30秒ごとに時刻更新
    const timer = setInterval(()=>{
      localStorage.setItem(LS_KEY, Date.now());
    }, 30000);

    return ()=>{
      window.removeEventListener('pageshow', checkAndReset);
      document.removeEventListener('visibilitychange', onVisible);
      clearInterval(timer);
    };
  },[]);

  // update theme-color meta
  useEffect(()=>{
    document.querySelector('meta[name=theme-color]').content=bgColor;
    document.body.style.background=bgColor;
    document.body.style.color=makeTheme(bgColor).text;
  },[bgColor]);

  const th = makeTheme(bgColor);
  const inputSt = {width:'100%',background:th.inputBg,border:`1px solid ${th.inputBorder}`,borderRadius:8,color:th.text,fontSize:14,padding:'9px 12px',outline:'none'};

  // nav
  const [view,setView]                   = useState('record');
  const [selFolder,setSelFolder]         = useState(null);
  const [selDate,setSelDate]             = useState(null);
  const [calY,setCalY]                   = useState(new Date().getFullYear());
  const [calM,setCalM]                   = useState(new Date().getMonth());

  // record form
  const [memo,setMemo]         = useState('');
  const [tgtFolder,setTgtFolder] = useState(null);
  const [locating,setLocating] = useState(false);
  const [locErr,setLocErr]     = useState(null);
  const [flash,setFlash]       = useState(false);
  const [okMsg,setOkMsg]       = useState(null);

  // gps position for map preview
  const [gpsPos,setGpsPos] = useState(null);

  // weather
  const [weather,setWeather]           = useState(null); // selected WEATHERS item id
  const [showWeatherPicker,setShowWeatherPicker] = useState(false);

  // modals
  const [showFolderModal,setShowFolderModal] = useState(false);
  const [editingFolder,setEditingFolder]     = useState(null);
  const [fName,setFName]                     = useState('');
  const [fColor,setFColor]                   = useState(FOLDER_COLORS[0]);
  const [confirm,setConfirm]                 = useState(null);
  const [moveModal,setMoveModal]             = useState(null);
  const [editingMemo,setEditingMemo]             = useState(null);
  const [editingPlace,setEditingPlace]           = useState(null);
  const [editingCoords,setEditingCoords]         = useState(null);
  const [manualCoords,setManualCoords]           = useState('');
  const [showManualInput,setShowManualInput]     = useState(false);
  const [showAllFolderStats,setShowAllFolderStats] = useState(false);
  const [searchQuery,setSearchQuery]               = useState('');
  const [searchFolder,setSearchFolder]             = useState('all'); // 'all' or folder id
  const [showSettings,setShowSettings]       = useState(false);
  const [customBg,setCustomBg]               = useState(bgColor);
  const [showDataModal,setShowDataModal]     = useState(false);
  const [importMsg,setImportMsg]             = useState(null);

  // ── export / import ──
  function exportData(){
    const data = JSON.stringify({folders,records,bgColor,exportedAt:new Date().toISOString()},null,2);
    const blob = new Blob([data],{type:'application/json'});
    const url  = URL.createObjectURL(blob);
    const a    = document.createElement('a');
    const date = new Date().toISOString().slice(0,10);
    a.href = url; a.download = `photo-location-${date}.json`;
    a.click(); URL.revokeObjectURL(url);
  }
  function importData(e){
    const file = e.target.files?.[0]; if(!file) return;
    const reader = new FileReader();
    reader.onload = ev=>{
      try{
        const d = JSON.parse(ev.target.result);
        if(!d.folders||!d.records) throw new Error('invalid');
        setFolders(d.folders);
        setRecords(d.records);
        if(d.bgColor) setBgColor(d.bgColor);
        setImportMsg(`✓ ${d.records.length}件の記録を復元しました`);
      }catch{
        setImportMsg('⚠ ファイルの形式が正しくありません');
      }
    };
    reader.readAsText(file);
    e.target.value=''; // reset so same file can be re-selected
  }

  // folder ops
  function openNewFolder(){ setEditingFolder(null);setFName('');setFColor(FOLDER_COLORS[Math.floor(Math.random()*FOLDER_COLORS.length)]);setShowFolderModal(true); }
  function openEditFolder(f){ setEditingFolder(f);setFName(f.name);setFColor(f.color);setShowFolderModal(true); }
  function saveFolder(){
    const name=fName.trim()||'新しいフォルダー';
    if(editingFolder){

        setMemo('');setFlash(true);

        setOkMsg(`📍 記録しました${place?' — '+place:''} → ${fn}`);

  // 座標パース：通常座標 / 度分秒 / GoogleマップURL に対応
  function parseCoords(str){
    const s = str.replace(/[（）()]/g,'').trim();

    // GoogleマップURL から座標抽出
    // 形式1: ?q=34.262,135.375
    let m = s.match(/[?&]q=(-?\d+\.?\d*),(-?\d+\.?\d*)/);
    if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};
    // 形式2: @34.262,135.375
    m = s.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);
    if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};
    // 形式3: /place/... ll=34.262,135.375
    m = s.match(/ll=(-?\d+\.?\d*),(-?\d+\.?\d*)/);
    if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};
    // 形式4: maps.google.com/?q=場所名+@34.262,135.375 などURLデコード
    try{
      const decoded = decodeURIComponent(s);
      m = decoded.match(/@(-?\d+\.?\d*),(-?\d+\.?\d*)/);
      if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};
      m = decoded.match(/[?&]q=(-?\d+\.?\d*),(-?\d+\.?\d*)/);
      if(m) return {lat:parseFloat(m[1]),lng:parseFloat(m[2])};
    }catch{}

    // 度分秒形式: 34°16'16.9, 135°18'36.0
    m = s.match(/(\d+)[°度](\d+)[′'分](\d+\.?\d*)[″"秒]?\s*[,\s]\s*(\d+)[°度](\d+)[′'分](\d+\.?\d*)/);
    if(m){
      const lat = parseFloat(m[1]) + parseFloat(m[2])/60 + parseFloat(m[3])/3600;
      const lng = parseFloat(m[4]) + parseFloat(m[5])/60 + parseFloat(m[6])/3600;
      return {lat,lng};
    }

    // 通常の小数座標
    m = s.match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/);
    if(m){
      const lat=parseFloat(m[1]), lng=parseFloat(m[2]);
      if(isNaN(lat)||isNaN(lng)) return null;
      if(lat<-90||lat>90||lng<-180||lng>180) return null;
      return {lat,lng};
    }
    return null;
  }

  // 手入力（座標 or GoogleマップURL）で記録

    if(!coords){
      setLocErr('URLまたは座標の形式が正しくありません');
      setLocating(false); return;
    }

    const now=new Date();
    const fid=tgtFolder||folders[0]?.id||null;
    let place=null;
    try{
      const res=await fetch(`https://nominatim.openstreetmap.org/reverse?lat=${coords.lat}&lon=${coords.lng}&format=json&accept-language=ja`);
      const data=await res.json();
      const a=data.address||{};
      place=a.city||a.town||a.village||a.county||a.state||null;
      if(place&&a.state&&a.state!==place) place=a.state+' '+place;
    }catch{}
    const rec={id:Date.now(),folderId:fid,date:toYMD(now),time:fmt(now),
      lat:coords.lat,lng:coords.lng,accuracy:null,memo:buildMemoWithWeather(memo.trim(),weather),weather,place};

    setGpsPos({lat:coords.lat,lng:coords.lng,acc:null});

  }

            'はれ':'晴れ','くもり':'曇り','くもりぞら':'曇天','あめ':'雨','かみなり':'雷雨',
            'らいう':'雷雨','ゆき':'雪','きり':'霧','かぜ':'風','もや':'霧','もうしょ':'猛暑',
            'あつい':'猛暑','よる':'夜','くらい':'夜',
          };
          const q = searchQuery.trim().toLowerCase();
          // ひらがな入力なら対応する漢字も検索対象に追加
          const qKanji = WEATHER_YOMI[q] || null;

          const results = records.filter(r=>{
            if(searchFolder!=='all' && r.folderId!==searchFolder) return false;
            const memoMatch = r.memo && (

                  h('span',{style:{background:th.accent+'44',color:th.accent,borderRadius:2,padding:'0 1px'}},

                              setEditingMemo(null);
                            }
                            if(e.key==='Escape') setEditingMemo(null);
                          },
                          style:{width:'100%',background:th.inputBg,border:`1px solid ${th.accent}`,
                            borderRadius:8,color:th.text,fontSize:13,padding:'7px 10px',

              recs.forEach(r=>{ const fid=r.folderId||'none'; counts[fid]=(counts[fid]||0)+1; });
              const total = recs.length;
              const sorted = Object.entries(counts).sort((a,b)=>b[1]-a[1]);
              const visible = showAllFolderStats ? sorted : sorted.slice(0,3);
              const rest = sorted.length - 3;
              const renderRow = ([fid,cnt])=>{
                const fol=folders.find(f=>f.id===fid);
                const pct=Math.round(cnt/total*100);
                return h('div',{key:fid,style:{marginBottom:10}},
                  h('div',{style:{display:'flex',justifyContent:'space-between',alignItems:'center',marginBottom:4}},
                    h('div',{style:{display:'flex',alignItems:'center',gap:7}},

                  ),
                  h('div',{style:{height:4,borderRadius:2,background:th.divider,overflow:'hidden'}},
                    h('div',{style:{height:'100%',borderRadius:2,width:pct+'%',background:fol?fol.color:th.textFaint,transition:'width .3s'}})
                  )
                );
              };

                rest>0 && h('button',{onClick:()=>setShowAllFolderStats(v=>!v),

                    cursor:'pointer',fontFamily:'inherit',padding:'2px 0',marginTop:2}},
                  showAllFolderStats?'▲ 折りたたむ':`▼ 他${rest}フォルダーを表示`)
              );
            })()
          ),
          h('div',{style:{marginTop:8,fontSize:11,color:th.textFaint,textAlign:'center'}},'● のある日付をタップすると詳細が見られます')
        ),

        // detail
        view==='detail'&&selDate && h('div',null,
          h('button',{onClick:()=>setView('calendar'),

          h('div',{style:{marginBottom:16}},
            h('div',{style:{fontFamily:'DM Mono',fontSize:12,color:th.textMuted,marginBottom:3}},selDate.replace(/-/g,'/')),
            h('div',{style:{fontSize:17,fontWeight:300,color:th.text}},'撮影地 '+dayRecs.length+'件')

          dayRecs.length===0&&h('div',{style:{fontSize:13,color:th.textFaint}},'記録がありません'),
          dayRecs.map((r,idx)=>{
            const fol=folders.find(f=>f.id===r.folderId);

                h('div',{style:{flex:1,minWidth:0}},
                  h('div',{style:{display:'flex',alignItems:'center',gap:8,marginBottom:4,flexWrap:'wrap'}},
                    h('span',{style:{fontFamily:'DM Mono',fontSize:11,color:th.textSub}},'#'+(idx+1)+' '+r.time),
                    fol&&h('span',{style:{fontSize:10,color:fol.color,background:fol.color+'22',
                      border:`1px solid ${fol.color}44`,borderRadius:4,padding:'1px 6px'}},fol.name),

                      onClick:()=>{
                        const cur=r.weather;

                        setRecords(p=>p.map(rec=>rec.id===r.id?{

                          weather:next.id,

                    )
                  ),
                  // place (市町村) — tap to edit
                  editingPlace?.id===r.id
                    ? h('div',{style:{display:'flex',gap:6,marginBottom:5,alignItems:'center'}},
                        h('span',{style:{fontSize:11,color:th.accent,flexShrink:0}},'📌'),
                        h('input',{autoFocus:true,value:editingPlace.text,
                          onChange:e=>setEditingPlace(p=>({...p,text:e.target.value})),
                          onKeyDown:e=>{
                            if(e.key==='Enter'){
                              setRecords(p=>p.map(rec=>rec.id===r.id?{...rec,place:editingPlace.text.trim()||null}:rec));

                          },
                          style:{flex:1,background:th.inputBg,border:`1px solid ${th.accent}`,

                        h('button',{onClick:()=>{
                            setRecords(p=>p.map(rec=>rec.id===r.id?{...rec,place:editingPlace.text.trim()||null}:rec));

                          },style:{background:th.accentBg,border:`1px solid ${th.accentBorder}`,borderRadius:5,

                          autoFocus:true,
                          rows:3,
                          value:editingMemo.text,
                          onChange:e=>setEditingMemo(m=>({...m,text:e.target.value})),
                          onKeyDown:e=>{
                            if(e.key==='Enter'&&!e.shiftKey){
                              e.preventDefault();
                              setRecords(p=>p.map(rec=>rec.id===r.id?{...rec,memo:editingMemo.text.trim()}:rec));
                              setEditingMemo(null);
                            }
                            if(e.key==='Escape') setEditingMemo(null);

                          style:{width:'100%',background:th.inputBg,border:`1px solid ${th.accent}`,

                            outline:'none',resize:'none',fontFamily:'inherit'},
                        }),
                        h('div',{style:{display:'flex',gap:8,marginTop:6}},
                          h('button',{
                            onClick:()=>{
                              setRecords(p=>p.map(rec=>rec.id===r.id?{...rec,memo:editingMemo.text.trim()}:rec));
                              setEditingMemo(null);
                            },
                            style:{background:th.accentBg,border:`1px solid ${th.accentBorder}`,borderRadius:6,
                              color:th.accent,padding:'5px 14px',fontSize:12,cursor:'pointer',fontFamily:'inherit'},
                          },'保存'),
                          h('button',{
                            onClick:()=>setEditingMemo(null),
                            style:{background:'none',border:`1px solid ${th.cardBorder}`,borderRadius:6,

                          },'キャンセル')

                        style:{display:'flex',alignItems:'flex-start',gap:6,marginBottom:5,cursor:'text',

                        title:'タップしてメモを編集',
                      },
                        h('span',{style:{fontSize:14,color:r.memo?th.text:th.textFaint,flex:1,lineHeight:1.5}},
                          r.memo||'メモを追加...'),
                        h('span',{style:{fontSize:12,color:th.textMuted,flexShrink:0,marginTop:1}},'✎')
                      ),
                  // coords — tap to edit
                  editingCoords?.id===r.id
                    ? h('div',{style:{marginTop:4,marginBottom:4}},
                        h('div',{style:{fontSize:10,color:th.textMuted,marginBottom:4}},
                          'Googleマップからコピーした座標を貼り付け'),
                        h('input',{autoFocus:true,value:editingCoords.text,
                          onChange:e=>setEditingCoords(c=>({...c,text:e.target.value})),
                          onKeyDown:e=>{
                            if(e.key==='Enter') saveEditCoords(r.id);
                            if(e.key==='Escape') setEditingCoords(null);
                          },

                          style:{width:'100%',background:th.inputBg,border:`1px solid ${th.accent}`,
                            borderRadius:6,color:th.text,fontSize:12,padding:'5px 8px',
                            outline:'none',fontFamily:'DM Mono',marginBottom:6}}),
                        h('div',{style:{display:'flex',gap:6}},
                          h('button',{onClick:()=>saveEditCoords(r.id),
                            style:{background:th.accentBg,border:`1px solid ${th.accentBorder}`,borderRadius:5,
                              color:th.accent,padding:'3px 10px',fontSize:11,cursor:'pointer',fontFamily:'inherit'}},'保存'),
                          h('button',{onClick:()=>setEditingCoords(null),
                            style:{background:'none',border:`1px solid ${th.cardBorder}`,borderRadius:5,
                              color:th.textSub,padding:'3px 10px',fontSize:11,cursor:'pointer',fontFamily:'inherit'}},'キャンセル')

                        h('span',{style:{fontSize:10,color:th.textFaint}},'✎'),
                        r.accuracy&&h('span',{style:{fontFamily:'DM Mono',fontSize:10,color:th.textFaint,marginLeft:4}},'±'+r.accuracy+'m')

                ),
                h('div',{style:{display:'flex',flexDirection:'column',gap:6,alignItems:'flex-end',flexShrink:0}},
                  h('a',{href:`https://www.google.com/maps?q=${r.lat},${r.lng}`,target:'_blank',
                    style:{display:'inline-flex',alignItems:'center',gap:5,color:th.accent,textDecoration:'none',

                  h('button',{onClick:()=>setMoveModal(r.id),

                      borderRadius:4,padding:'4px 10px',fontSize:12}},'移動'),
                  h('button',{onClick:()=>setConfirm({type:'record',id:r.id}),
                    style:{background:'none',border:'1px solid rgba(255,80,80,0.3)',color:'rgba(255,120,120,0.7)',

      // ══ RECORD ══
      view==='record' && h('div',{style:{display:'flex',flexDirection:'column',gap:16}},

        // ── 大きな記録ボタン ──
        h('div',{style:{
          display:'flex',flexDirection:'column',alignItems:'center',gap:12,
          padding:'28px 20px 24px',borderRadius:16,
          background:th.cardBg,border:`1px solid ${th.accentBorder}`,
          position:'relative',
        }},
          // weather badge（右上）
          h('div',{onClick:()=>setShowWeatherPicker(true),
            style:{position:'absolute',top:12,right:12,
              display:'flex',alignItems:'center',gap:5,cursor:'pointer',

            weather

                  h('span',{style:{fontSize:18}},WEATHERS.find(w=>w.id===weather)?.icon),

              : h(React.Fragment,null,
                  h('span',{style:{fontSize:15}},'🌤️'),
                  h('span',{style:{fontSize:11,color:th.textMuted}},'天気'))

          // shutter button — big
          h('button',{onClick:saveRecord,disabled:locating,
            className:locating?'spin':'',
            style:{background:'none',border:`3px solid ${th.accent}`,borderRadius:'50%',

              cursor:'pointer',transition:'transform .1s',flexShrink:0}},
            h('div',{style:{width:84,height:84,borderRadius:'50%',
              background:locating?'transparent':th.accentBg,
              display:'flex',alignItems:'center',justifyContent:'center',fontSize:36}},
              locating?'⏳':'📷')
          ),
          h('div',{style:{textAlign:'center'}},
            h('div',{style:{fontSize:15,color:th.text,fontWeight:300,marginBottom:3}},
              locating?'位置情報取得中...':`タップして記録`),
            h('div',{style:{fontSize:11,color:th.textMuted}},
              locating?'しばらくお待ちください':'現在地・天気を自動取得')
          ),

          // error / success
          locErr&&h('div',{style:{width:'100%',padding:'8px 12px',borderRadius:8,
            background:'rgba(255,80,80,0.08)',border:'1px solid rgba(255,80,80,0.25)',
            color:'#ff9090',fontSize:12,textAlign:'center'}},'⚠ '+locErr),
          okMsg&&h('div',{style:{width:'100%',padding:'8px 12px',borderRadius:8,
            background:th.accentBg,border:`1px solid ${th.accentBorder}`,
            color:th.accent,fontSize:12,textAlign:'center'}},okMsg)
        ),

        // ── 詳細設定（折りたたみ） ──
        h('div',{style:{borderRadius:12,background:th.cardBg,border:`1px solid ${th.cardBorder}`,overflow:'hidden'}},
          // toggle header
          h('div',{onClick:()=>setShowManualInput(v=>!v),
            style:{display:'flex',alignItems:'center',justifyContent:'space-between',
              padding:'12px 16px',cursor:'pointer',userSelect:'none'}},
            h('span',{style:{fontSize:12,color:th.textSub}},showManualInput?'▲ 詳細設定':'▼ 詳細設定（フォルダー・メモ・座標入力）'),
            h('span',{style:{fontSize:11,color:th.textMuted}},
              [tgtFolder&&folders.find(f=>f.id===tgtFolder)?.name, memo&&'メモあり'].filter(Boolean).join('・')||'')
          ),
          // expanded content
          showManualInput && h('div',{style:{padding:'0 16px 16px',display:'flex',flexDirection:'column',gap:14,
            borderTop:`1px solid ${th.divider}`}},
            h('div',{style:{paddingTop:14}}),

            // folder
            h('div',null,
              h('label',{style:{fontSize:11,color:th.textSub,letterSpacing:2,display:'block',marginBottom:8}},'保存先フォルダー'),
              h('select',{value:tgtFolder||'',onChange:e=>setTgtFolder(e.target.value||null),

                folders.map(f=>h('option',{key:f.id,value:f.id},f.name)),

            // memo
            h('div',null,
              h('label',{style:{fontSize:11,color:th.textSub,letterSpacing:2,display:'block',marginBottom:8}},'メモ（任意）'),
              h('textarea',{value:memo,onChange:e=>setMemo(e.target.value),rows:2,
                placeholder:'場所の名前や撮影メモ...',style:{...inputSt,resize:'none'}})

            // manual coords
            h('div',null,
              h('label',{style:{fontSize:11,color:th.textSub,letterSpacing:2,display:'block',marginBottom:6}},
                '📋 座標・URLで記録（忘れた時・GPS修正）'),
              h('div',{style:{fontSize:11,color:th.textFaint,marginBottom:8,lineHeight:1.8}},
                '① iPhoneはSafari・AndroidはChromeで',h('br'),
                '　 goo.glのURLを開く → URLバーの長いURLをコピーして貼り付け',h('br'),

              ),
              h('input',{value:manualCoords,onChange:e=>setManualCoords(e.target.value),
                placeholder:'GoogleマップのURLまたは座標を貼り付け',
                onKeyDown:e=>e.key==='Enter'&&saveManualRecord(),
                style:{...inputSt,fontFamily:'inherit',fontSize:13,marginBottom:8}}),
              h('button',{onClick:saveManualRecord,disabled:locating||!manualCoords.trim(),
                style:{width:'100%',background:th.accentBg,border:`1px solid ${th.accentBorder}`,
                  borderRadius:8,color:th.accent,padding:'9px',fontSize:13,cursor:'pointer',
                  fontFamily:'inherit',opacity:manualCoords.trim()?1:0.4}},
                '📍 この座標で記録する')
            )
          )
        ),

        // ── 最近の記録 ──
        records.length>0&&h('div',null,
          h('div',{style:{fontSize:11,color:th.textMuted,letterSpacing:2,marginBottom:10}},'最近の記録'),
          records.slice(0,3).map(r=>{
            const fol=folders.find(f=>f.id===r.folderId);
            const wt=r.weather?WEATHERS.find(w=>w.id===r.weather):null;
            return h('div',{key:r.id,style:{padding:'11px 13px',borderRadius:8,marginBottom:7,
              background:th.cardBg,border:`1px solid ${th.cardBorder}`,
              display:'flex',justifyContent:'space-between',alignItems:'center',gap:10}},
              h('div',{style:{flex:1,minWidth:0}},
                h('div',{style:{display:'flex',alignItems:'center',gap:6,marginBottom:r.place||r.memo?3:0}},
                  h('span',{style:{fontFamily:'DM Mono',fontSize:11,color:th.textSub}},r.date+' '+r.time),
                  fol&&h('span',{style:{fontSize:10,color:fol.color}},fol.name),
                  wt&&h('span',{style:{fontSize:12}},wt.icon)
                ),
                r.place&&h('div',{style:{fontSize:12,color:th.accent,marginBottom:1}},'📌 '+r.place),
                r.memo&&h('div',{style:{fontSize:12,color:th.text,overflow:'hidden',textOverflow:'ellipsis',whiteSpace:'nowrap'}},r.memo)

              h('a',{href:`https://www.google.com/maps?q=${r.lat},${r.lng}`,target:'_blank',

    // footer
    h('div',{style:{padding:'10px 20px',fontSize:10,color:th.textFaint,letterSpacing:1,textAlign:'center'}},
      '位置情報はデバイス内にのみ保存されます')
  );
}

ReactDOM.createRoot(document.getElementById('app')).render(h(App));
</script>

<!-- Service Worker for offline support -->
<script>
if('serviceWorker' in navigator){
  const swCode = `
    const CACHE='photo-loc-v1';
    const ASSETS=[
      'https://fonts.googleapis.com/css2?family=Noto+Sans+JP:wght@300;400;500&family=DM+Mono:wght@400;500&display=swap',
      'https://cdnjs.cloudflare.com/ajax/libs/react/18.3.1/umd/react.production.min.js',
      'https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.3.1/umd/react-dom.production.min.js',
    ];
    self.addEventListener('install',e=>{
      e.waitUntil(caches.open(CACHE).then(c=>c.addAll(ASSETS).catch(()=>{})));
      self.skipWaiting();
    });
    self.addEventListener('activate',e=>{
      e.waitUntil(caches.keys().then(keys=>Promise.all(keys.filter(k=>k!==CACHE).map(k=>caches.delete(k)))));
      self.clients.claim();
    });
    self.addEventListener('fetch',e=>{
      e.respondWith(caches.match(e.request).then(r=>r||fetch(e.request)));
    });
  `;
  const blob = new Blob([swCode],{type:'application/javascript'});
  const url  = URL.createObjectURL(blob);
  navigator.serviceWorker.register(url).catch(()=>{});
}
</script>
